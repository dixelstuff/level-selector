<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FlipWords phone review</title>
<style>
  :root{--bg:#faf9ff;--card:#fff;--ink:#22223a;--muted:#6f6b80;--line:#e3dff3;--purple:#8c52ff;--soft:#f0ebff;--bad:#ffe8ec;--ok:#e8f5ee;--warn:#fff5d9;}
  *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);}
  .wrap{max-width:720px;margin:0 auto;padding:14px 13px 26px;}
  .top{position:sticky;top:0;z-index:5;background:rgba(250,249,255,.96);backdrop-filter:blur(10px);padding:10px 0 8px;border-bottom:1px solid var(--line);}
  .bar{display:flex;gap:8px;align-items:center;justify-content:space-between;font-size:13px;color:var(--muted)}
  .pill{border:1px solid var(--line);border-radius:999px;padding:5px 9px;background:white}
  .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.tabs button{font-size:14px;font-weight:800;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);padding:10px}.tabs button.active{background:var(--soft);border-color:#d7c8ff;color:var(--purple)}
  .card{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 5px 18px rgba(45,35,80,.06)}
  .info-card{height:238px;display:flex;flex-direction:column;justify-content:flex-start;overflow:hidden;}
  .level{font-weight:800;font-size:19px;margin-bottom:8px}.puzzle{font-size:25px;font-weight:850;letter-spacing:.04em;line-height:1.25;margin:8px 0;text-align:center}.puzzle span{white-space:nowrap}.arrow{color:var(--purple);font-weight:900;margin:0 4px}.flags{font-size:13px;color:#4e4770;line-height:1.32;margin-top:8px;font-weight:650}.stats{font-size:14px;color:var(--muted);line-height:1.35;margin-top:10px}.reverse{font-size:14px;color:var(--muted);line-height:1.35;margin-top:6px}.decision{font-size:13px;color:var(--purple);font-weight:700;margin-top:7px;min-height:18px}.hint{font-size:12px;color:var(--muted);line-height:1.3;margin-top:5px;}
  button{font-family:inherit}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}.actions button,.nav button,.tools button,.wordTools button{font-size:15px;font-weight:750;border:1px solid var(--line);border-radius:14px;background:white;color:var(--ink);padding:12px 9px}.actions button.primary,.wordTools button.primary{background:var(--soft);border-color:#d7c8ff}.actions button.danger,.wordTools button.danger{background:var(--bad)}.actions button.ok{background:var(--ok)}.actions button.warn{background:var(--warn)}button:disabled{opacity:.38;filter:grayscale(1);background:#f2f2f4!important;color:#8b8994!important;border-color:#ddd!important;box-shadow:none!important}
  .nav{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}.nav input{min-width:0;border:1px solid var(--line);border-radius:14px;padding:12px;font-size:16px;text-align:center;background:white}.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.small{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.35}.export{display:none;margin-top:14px}.export textarea{width:100%;height:180px;border:1px solid var(--line);border-radius:14px;padding:10px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}.show{display:block}.hidden{display:none!important}
  .wordHead{display:flex;align-items:center;gap:8px;justify-content:space-between;margin-bottom:10px}.wordTitle{font-size:17px;font-weight:850;line-height:1.25}.wordSub{font-size:12px;color:var(--muted);line-height:1.35;margin-top:4px}.wordNav{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.wordNav button{font-size:14px;font-weight:800;border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px}.wordSelect{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;padding:11px;font-size:15px;margin-top:10px}.pairs{font-size:12px;color:var(--muted);line-height:1.35;margin-top:9px}.wordList{display:flex;flex-direction:column;gap:8px;margin-top:12px}.wordRow{border:1px solid var(--line);border-radius:14px;background:white;padding:10px 10px 9px;display:grid;grid-template-columns:30px 1fr;gap:8px;align-items:start}.wordRow:has(input:checked){background:var(--soft)!important;border-color:#d7c8ff}.wordRow input{width:21px;height:21px;margin-top:2px}.wordRowPuzzle{font-size:16px;font-weight:850;letter-spacing:.03em;line-height:1.3}.wordRowMeta{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.3}.lowUniq{color:#a65a00;font-weight:800}.wordTools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.wordCount{font-size:12px;color:var(--muted);font-weight:700;margin-top:6px;min-height:16px}.empty{font-size:14px;color:var(--muted);padding:12px 0}.bulkSticky{position:sticky;bottom:0;background:rgba(250,249,255,.96);backdrop-filter:blur(8px);padding:9px 0 0;border-top:1px solid var(--line);margin-top:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="bar"><div class="pill" id="packInfo">Loading…</div><div class="pill" id="decisionInfo">0 decisions</div></div>
    <div class="tabs"><button id="levelTab" class="active" type="button">Level mode</button><button id="wordsTab" type="button">Words mode</button></div>
  </div>

  <section id="levelMode">
    <div class="card info-card">
      <div class="level" id="level"></div>
      <div class="puzzle" id="puzzle"></div>
      <div class="flags" id="flags"></div>
      <div class="stats" id="stats"></div>
      <div class="reverse" id="reverse"></div>
      <div class="decision" id="decision"></div>
      <div class="hint" id="hint"></div>
    </div>
    <div class="card">
      <div class="actions">
        <button class="primary" data-action="flip_face" type="button">Flip face read</button>
        <button class="danger" data-action="remove" type="button">Remove</button>
        <button class="warn" data-action="overflow" type="button">Overflow</button>
        <button class="ok" data-action="reverse_no_flip" type="button">Reverse no flip</button>
        <button class="ok" data-action="reverse_flip" type="button">Reverse + flip</button>
        <button class="ok" id="addReverseBtn" data-action="add_reverse_overflow" type="button">Add reverse</button>
        <button class="ok" id="addReverseFlipBtn" data-action="add_reverse_overflow_flip" type="button">Add reverse + flip current</button>
        <button data-action="clear" type="button">Clear decision</button>
      </div>
      <div class="nav"><button id="backBtn" type="button">Back</button><input id="jumpInput" inputmode="numeric" placeholder="Level"><button id="nextBtn" type="button">Next</button></div>
      <div class="tools"><button id="copyBtn" type="button">Copy TSV</button><button id="clearAllBtn" type="button">Clear all</button></div>
    </div>
  </section>

  <section id="wordsMode" class="hidden">
    <div class="card">
      <div class="wordHead"><div><div class="wordTitle" id="wordTitle"></div><div class="wordSub" id="wordSub"></div></div><div class="pill" id="wordPos"></div></div>
      <select class="wordSelect" id="wordSelect"></select>
      <div class="wordNav"><button id="prevWordBtn" type="button">Previous word</button><button id="nextWordBtn" type="button">Next word</button></div>
      <div class="pairs" id="wordPairs"></div>
      <div class="wordTools"><button id="selectAllBtn" type="button">Select all shown</button><button id="selectNoneBtn" type="button">Clear selection</button></div>
      <div class="wordCount" id="wordCount"></div>
      <div class="wordList" id="wordList"></div>
      <div class="bulkSticky"><div class="wordTools"><button class="danger" id="bulkRemoveBtn" type="button">Remove selected</button><button class="primary" id="bulkFlipBtn" type="button">Flip selected</button></div></div>
    </div>
  </section>

  <div class="export" id="exportBox"><textarea id="exportText" spellcheck="false"></textarea><div class="small">Copy this TSV into Mode 33.</div></div>
</div>
<script src="mode32_phone_review_data.js?v=207"></script>
<script>
(function(){
  const payload = window.FLIPWORDS_PHONE_REVIEW_DATA || {};
  const rows = payload.rows || [];
  const groups = payload.wordGroups || [];
  const key = 'flipwords_phone_review_v6_words_' + (payload.dataKey || 'default');
  let state = {idx:0, wordIdx:0, decisions:{}, selected:{}};
  try{ state = Object.assign(state, JSON.parse(localStorage.getItem(key) || '{}')); }catch(e){}
  let idx = Math.min(Math.max(0, state.idx||0), Math.max(0, rows.length-1));
  let wordIdx = Math.min(Math.max(0, state.wordIdx||0), Math.max(0, groups.length-1));
  let decisions = state.decisions || {};
  let selected = state.selected || {};
  let mode = state.mode || 'level';
  const $ = id => document.getElementById(id);
  const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  function save(){ localStorage.setItem(key, JSON.stringify({idx,wordIdx,decisions,selected,mode})); updateDecisionInfo(); }
  function updateDecisionInfo(){ $('decisionInfo').textContent = Object.keys(decisions).length + ' decisions'; }
  function puzzleHTML(r, small=false){ const cls=small?'wordRowPuzzle':'puzzle'; return `<div class="${cls}"><span>${esc((r.word1||'').toUpperCase())} ${esc((r.word2||'').toUpperCase())}</span> <span class="arrow">&gt;</span> <span>${esc((r.answer1||'').toUpperCase())} ${esc((r.answer2||'').toUpperCase())}</span></div>`; }
  function decisionText(d){ if(!d) return ''; return 'Decision: ' + String(d.action||'').replaceAll('_',' '); }
  function rowMeta(r){ const u = parseInt(r.uniqScore,10); const uq = Number.isFinite(u) && u < 50 ? `<span class="lowUniq">uniq ${esc(r.uniqScore)}</span>` : `uniq ${esc(r.uniqScore)}`; return `${uq} · m${esc(r.minMoves)} d${esc(r.difficulty)} · ${esc(r.category||'')}`; }
  function setMode(m){ mode=m; $('levelMode').classList.toggle('hidden',m!=='level'); $('wordsMode').classList.toggle('hidden',m!=='words'); $('levelTab').classList.toggle('active',m==='level'); $('wordsTab').classList.toggle('active',m==='words'); save(); if(m==='level') renderLevel(); else renderWords(); }
  function renderLevel(){
    const r = rows[idx] || {};
    $('packInfo').textContent = rows.length ? `Level ${r.level} / ${rows.length}` : 'No rows';
    $('level').textContent = `Level ${r.level || ''}:`;
    $('puzzle').innerHTML = puzzleHTML(r);
    $('flags').innerHTML = (r.flags || []).map(f => f.text || '').filter(Boolean).join('<br>');
    $('stats').innerHTML = rowMeta(r);
    $('reverse').textContent = r.reverse || '';
    $('decision').textContent = decisionText(decisions[r.id]);
    $('hint').textContent = r.unpairedReverse ? 'Reverse can be added if needed.' : '';
    document.querySelectorAll('[data-action]').forEach(btn => {
      if(btn.id === 'addReverseBtn' || btn.id === 'addReverseFlipBtn'){
        btn.disabled = !(r.unpairedReverse && r.reverseState === 'missing_available');
      }
    });
    $('jumpInput').value = '';
    updateDecisionInfo();
  }
  function setDecisionForRow(r, action){
    if(!r || !r.id) return;
    if(action === 'clear') delete decisions[r.id];
    else decisions[r.id] = {level:r.level, id:r.id, action:action, reverseId:r.reverseId||'', reverseLevel:r.reverseLevel||'', ts:new Date().toISOString()};
  }
  function setDecision(action){
    const r = rows[idx];
    if((action === 'add_reverse_overflow' || action === 'add_reverse_overflow_flip') && !(r.unpairedReverse && r.reverseState === 'missing_available')){ alert('Reverse already exists, is not allowed, or is missing clue support.'); return; }
    setDecisionForRow(r, action);
    if(action !== 'clear' && idx < rows.length - 1) idx++;
    save(); renderLevel();
  }
  function exportTSV(){
    const header = 'level\tid\taction\treverseId\treverseLevel';
    const lines = [header];
    rows.forEach(r => { const d = decisions[r.id]; if(d) lines.push([r.level,r.id,d.action,d.reverseId||r.reverseId||'',d.reverseLevel||r.reverseLevel||''].join('\t')); });
    const text = lines.join('\n') + '\n'; $('exportText').value = text; $('exportBox').classList.add('show'); return text;
  }
  function activeGroupRows(g){ return (g.rows||[]).map(i => rows[i]).filter(r => r && !decisions[r.id]); }
  function renderGroupOptions(){
    $('wordSelect').innerHTML = groups.map((g,i) => `<option value="${i}">${esc(g.label || g.id)}</option>`).join('');
    $('wordSelect').value = String(wordIdx);
  }
  function rowGapMap(list){
    const sorted = [...list].sort((a,b)=>(a.level||0)-(b.level||0));
    const out = {};
    sorted.forEach((r,i) => {
      const prev = i>0 ? Math.abs((r.level||0)-(sorted[i-1].level||0)) : Infinity;
      const next = i<sorted.length-1 ? Math.abs((sorted[i+1].level||0)-(r.level||0)) : Infinity;
      const gap = Math.min(prev,next);
      out[r.id] = Number.isFinite(gap) ? gap : 9999;
    });
    return out;
  }
  function rowBg(gap){
    if(gap <= 25) return 'background:#ffd8d8';
    if(gap <= 50) return 'background:#ffe3e3';
    if(gap <= 100) return 'background:#ffeeee';
    if(gap <= 200) return 'background:#fff6f6';
    return '';
  }
  function renderWords(){
    if(!groups.length){ $('packInfo').textContent='Words mode'; $('wordTitle').textContent='No word groups'; $('wordSub').textContent=''; $('wordList').innerHTML='<div class="empty">No flagged word groups.</div>'; return; }
    wordIdx = Math.min(Math.max(0, wordIdx), groups.length-1);
    const g = groups[wordIdx];
    const visibleRows = activeGroupRows(g);
    $('packInfo').textContent = 'Words mode';
    $('wordPos').textContent = `${wordIdx+1} / ${groups.length}`;
    $('wordTitle').innerHTML = `${esc(g.title || g.key || '')}<br>${visibleRows.length} remaining`;
    $('wordSub').textContent = '';
    renderGroupOptions();
    $('wordPairs').textContent = (g.pairs && g.pairs.length) ? ('Direct pairs: ' + g.pairs.join(' · ')) : '';
    const sel = selected[g.id] || {};
    const gaps = rowGapMap(visibleRows);
    $('wordList').innerHTML = visibleRows.length ? visibleRows.map(r => {
      const checked = sel[r.id] ? 'checked' : '';
      const gap = gaps[r.id] || 9999;
      const style = rowBg(gap);
      return `<label class="wordRow" style="${style}"><input type="checkbox" data-word-row="${esc(r.id)}" ${checked}><div><div class="wordRowMeta">Level ${esc(r.level)}</div>${puzzleHTML(r,true)}<div class="wordRowMeta">${rowMeta(r)}</div></div></label>`;
    }).join('') : '<div class="empty">No remaining rows for this word.</div>';
    document.querySelectorAll('[data-word-row]').forEach(cb => cb.addEventListener('change', () => { const s = selected[g.id] || {}; if(cb.checked) s[cb.dataset.wordRow]=true; else delete s[cb.dataset.wordRow]; selected[g.id]=s; save(); updateWordCount(); }));
    updateWordCount(); updateDecisionInfo();
  }
  function updateWordCount(){ const g=groups[wordIdx]||{}; const s=selected[g.id]||{}; const n=Object.keys(s).filter(id => !decisions[id]).length; $('wordCount').textContent = n ? `${n} selected` : ''; }
  function selectVisible(on){ const g=groups[wordIdx]; if(!g) return; const s=selected[g.id] || {}; activeGroupRows(g).forEach(r => { if(on) s[r.id]=true; else delete s[r.id]; }); selected[g.id]=s; save(); renderWords(); }
  function bulk(action){ const g=groups[wordIdx]; if(!g) return; const s=selected[g.id] || {}; let n=0; Object.keys(s).forEach(id => { const r=rows.find(x=>x.id===id); if(r && !decisions[id]){ setDecisionForRow(r, action); n++; } }); selected[g.id] = {}; save(); renderWords(); if(n===0) alert('No selected rows.'); }
  function nextWord(delta){ if(!groups.length) return; wordIdx = (wordIdx + delta + groups.length) % groups.length; selected[groups[wordIdx].id] = selected[groups[wordIdx].id] || {}; save(); renderWords(); }
  document.querySelectorAll('[data-action]').forEach(btn => btn.addEventListener('click', () => setDecision(btn.dataset.action)));
  $('backBtn').addEventListener('click', () => { idx=Math.max(0,idx-1); save(); renderLevel(); });
  $('nextBtn').addEventListener('click', () => { idx=Math.min(rows.length-1,idx+1); save(); renderLevel(); });
  $('jumpInput').addEventListener('change', () => { const n=parseInt($('jumpInput').value,10); if(n>=1&&n<=rows.length){ idx=n-1; save(); renderLevel(); }});
  $('copyBtn').addEventListener('click', async () => { const text=exportTSV(); try{ await navigator.clipboard.writeText(text); alert('Copied TSV'); }catch(e){ $('exportText').focus(); $('exportText').select(); } });
  $('clearAllBtn').addEventListener('click', () => { if(confirm('Clear all phone decisions for this pack?')){ decisions={}; selected={}; save(); if(mode==='level') renderLevel(); else renderWords(); }});
  $('levelTab').addEventListener('click', () => setMode('level'));
  $('wordsTab').addEventListener('click', () => setMode('words'));
  $('prevWordBtn').addEventListener('click', () => nextWord(-1));
  $('nextWordBtn').addEventListener('click', () => nextWord(1));
  $('wordSelect').addEventListener('change', () => { wordIdx=parseInt($('wordSelect').value,10)||0; save(); renderWords(); });
  $('selectAllBtn').addEventListener('click', () => selectVisible(true));
  $('selectNoneBtn').addEventListener('click', () => selectVisible(false));
  $('bulkRemoveBtn').addEventListener('click', () => bulk('remove'));
  $('bulkFlipBtn').addEventListener('click', () => bulk('flip_face'));
  renderGroupOptions(); setMode(mode);
})();
</script>
</body>
</html>
